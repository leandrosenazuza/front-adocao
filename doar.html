<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pata Amada - Doe</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" type="text/css" href="css/reset.css">
</head>
<body class="body bodydoe">
    <div class="container-body container-doe">
        <header>
            <div class="logo">
                <img src="Images/logoPata.png" alt="Pata Amada Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="/index.html"><b>Home</b></a></li>
                    <li><a href="/sobre.html"><b>Sobre</b></a></li>
                    <li><a href="/adote.html"><b>Adote</b></a></li>
                    <li><a href="/doar.html"><b>Doe</b></a></li>
                    <li><a href="/login.html"><b>Login</b></a></li>
                </ul>
            </nav>
        </header>
    
        <div class="wrapper wrapper-doe">
            <section class="donate-section">
                <div class="form-wraper">
                    <div class="form-container">
                        <h2>Disponibilize um Pet para Adoção</h2>
                        <form action="#" method="post">
                            <label for="nome-pet">Nome do Pet:</label>
                            <input type="text" id="nome-pet" name="nome-pet" required>
    
                            <label for="idade-pet">Idade:</label>
                            <input type="number" id="idade-pet" name="idade-pet" required>
    
                            <label for="raca-pet">Raça:</label>
                            <input type="text" id="raca-pet" name="raca-pet" required>
    
                            <label for="descricao-pet">Descrição:</label>
                            <textarea id="descricao-pet" name="descricao-pet" rows="4" required></textarea>
    
                            <label for="contato">Seu Contato:</label>
                            <input type="email" id="contato" name="contato" required>
    
                            <button type="submit">Enviar</button>
                        </div><!--form-container-->
                    </form>
                </div><!--form-container-->
                
                <div class="qr-code-container">
                    <h2>Apoie com uma Doação!</h2>
                    <p>Doe para nos ajudar a cuidar dos nossos resgatados!</p>
                    <img src="/Images/qrcode.png" alt="QR Code para Doação">
                </div><!--qr-code-container-->
            </section><!--donate-section-->
        </div><!--wrapper wrapper-doe-->
    </div><!--container-body container-doe-->
</body>
<script src="/js/jquery.js"></script>
<script src="/js/script.js"></script>
</html>
